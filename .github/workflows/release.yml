name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-crates:
    name: Publish Rust crates
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-rust

      - name: Publish fallow-types
        run: cargo publish -p fallow-types || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish fallow-config
        run: cargo publish -p fallow-config || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish fallow-extract
        run: cargo publish -p fallow-extract || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish fallow-graph
        run: cargo publish -p fallow-graph || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish fallow-core
        run: cargo publish -p fallow-core || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish fallow-license
        run: cargo publish -p fallow-license || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish fallow-v8-coverage
        run: cargo publish -p fallow-v8-coverage || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish fallow-cli
        run: cargo publish -p fallow-cli || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish fallow-mcp
        run: cargo publish -p fallow-mcp || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: fallow
            lsp_binary: fallow-lsp
            mcp_binary: fallow-mcp
            npm_dir: darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: fallow
            lsp_binary: fallow-lsp
            mcp_binary: fallow-mcp
            npm_dir: darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: fallow
            lsp_binary: fallow-lsp
            mcp_binary: fallow-mcp
            npm_dir: linux-x64-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: fallow
            lsp_binary: fallow-lsp
            mcp_binary: fallow-mcp
            npm_dir: linux-arm64-gnu
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: fallow
            lsp_binary: fallow-lsp
            mcp_binary: fallow-mcp
            npm_dir: linux-x64-musl
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary: fallow
            lsp_binary: fallow-lsp
            mcp_binary: fallow-mcp
            npm_dir: linux-arm64-musl
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: fallow.exe
            lsp_binary: fallow-lsp.exe
            mcp_binary: fallow-mcp.exe
            npm_dir: win32-x64-msvc
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            binary: fallow.exe
            lsp_binary: fallow-lsp.exe
            mcp_binary: fallow-mcp.exe
            npm_dir: win32-arm64-msvc

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.target }}
          cache-key: ${{ matrix.target }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install aarch64 cross-compilation tools
        if: contains(matrix.target, 'aarch64-unknown-linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build CLI release binary
        run: cargo build --release --target ${{ matrix.target }} -p fallow-cli
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc

      - name: Build LSP release binary
        run: cargo build --release --target ${{ matrix.target }} -p fallow-lsp
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc

      - name: Build MCP release binary
        run: cargo build --release --target ${{ matrix.target }} -p fallow-mcp
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc

      - name: Install NAPI package dependencies
        run: cd crates/napi && npm ci --omit=optional

      - name: Build NAPI addon
        run: cd crates/napi && npx napi build --platform --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc

      - name: Package binaries (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../fallow-${{ matrix.target }}.tar.gz ${{ matrix.binary }} ${{ matrix.lsp_binary }} ${{ matrix.mcp_binary }}

      - name: Package binaries (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../fallow-${{ matrix.target }}.zip ${{ matrix.binary }} ${{ matrix.lsp_binary }} ${{ matrix.mcp_binary }}

      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fallow-${{ matrix.target }}
          path: fallow-${{ matrix.target }}.*

      - name: Rename CLI, LSP, and MCP binaries with target identifier (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} fallow-${{ matrix.npm_dir }}
          cp target/${{ matrix.target }}/release/${{ matrix.lsp_binary }} fallow-lsp-${{ matrix.npm_dir }}
          cp target/${{ matrix.target }}/release/${{ matrix.mcp_binary }} fallow-mcp-${{ matrix.npm_dir }}

      - name: Rename CLI, LSP, and MCP binaries with target identifier (windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} fallow-${{ matrix.npm_dir }}.exe
          cp target/${{ matrix.target }}/release/${{ matrix.lsp_binary }} fallow-lsp-${{ matrix.npm_dir }}.exe
          cp target/${{ matrix.target }}/release/${{ matrix.mcp_binary }} fallow-mcp-${{ matrix.npm_dir }}.exe

      - name: Sign raw binaries
        shell: bash
        env:
          ED25519_BINARY_SIGNING_PRIVATE_KEY: ${{ secrets.ED25519_BINARY_SIGNING_PRIVATE_KEY }}
          ED25519_BINARY_SIGNING_PUBLIC_KEY: ${{ vars.ED25519_BINARY_SIGNING_PUBLIC_KEY }}
        run: |
          ext=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            ext=".exe"
          fi

          for bin in \
            "fallow-${{ matrix.npm_dir }}${ext}" \
            "fallow-lsp-${{ matrix.npm_dir }}${ext}" \
            "fallow-mcp-${{ matrix.npm_dir }}${ext}"
          do
            node .github/scripts/sign-binary.mjs "$bin" "${bin}.sig"
            node .github/scripts/verify-binary.mjs "$bin" "${bin}.sig"
          done

      - name: Upload CLI artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fallow-cli-${{ matrix.npm_dir }}
          path: |
            fallow-${{ matrix.npm_dir }}${{ runner.os == 'Windows' && '.exe' || '' }}
            fallow-${{ matrix.npm_dir }}${{ runner.os == 'Windows' && '.exe' || '' }}.sig

      - name: Upload LSP artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fallow-lsp-${{ matrix.npm_dir }}
          path: |
            fallow-lsp-${{ matrix.npm_dir }}${{ runner.os == 'Windows' && '.exe' || '' }}
            fallow-lsp-${{ matrix.npm_dir }}${{ runner.os == 'Windows' && '.exe' || '' }}.sig

      - name: Upload MCP artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fallow-mcp-${{ matrix.npm_dir }}
          path: |
            fallow-mcp-${{ matrix.npm_dir }}${{ runner.os == 'Windows' && '.exe' || '' }}
            fallow-mcp-${{ matrix.npm_dir }}${{ runner.os == 'Windows' && '.exe' || '' }}.sig

      - name: Upload npm binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-${{ matrix.npm_dir }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.binary }}
            target/${{ matrix.target }}/release/${{ matrix.lsp_binary }}
            target/${{ matrix.target }}/release/${{ matrix.mcp_binary }}

      - name: Upload NAPI addon
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: napi-${{ matrix.npm_dir }}
          path: crates/napi/fallow-node.${{ matrix.npm_dir }}.node

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          pattern: fallow-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: artifacts/**/*
          generate_release_notes: false
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update stable action tags
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          git tag -f v1 "${GITHUB_SHA}"
          git push origin refs/tags/v1 --force

  npm-publish:
    name: Publish to npm
    needs: [build, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      TAG_REF: ${{ github.ref }}
      # Bootstrap fallback. When NPM_TOKEN is present in repo secrets,
      # setup-node writes it to .npmrc and `npm publish` authenticates
      # with it. When the secret is absent (steady state, once every
      # package has a trusted publisher registered), this stays empty
      # and OIDC / trusted publishing handles auth exactly like today.
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure latest npm (for trusted publishing)
        run: npm install -g npm@10.9.8 && npm install -g npm@latest

      - name: Download all npm binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: npm-*
          path: npm-artifacts

      - name: Download all NAPI addons
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: napi-*
          path: napi-artifacts

      - name: Organize binaries into npm directories
        run: |
          for dir in npm-artifacts/npm-*; do
            target="npm/$(basename "$dir" | sed 's/^npm-//')"
            mkdir -p "$target"
            cp "$dir"/* "$target"/
          done

      - name: Set binary permissions
        run: |
          for bin in npm/*/fallow npm/*/fallow-lsp npm/*/fallow-mcp; do
            [ -f "$bin" ] && chmod +x "$bin"
          done

      - name: Update versions
        run: |
          VERSION="${TAG_REF#refs/tags/v}"
          for pkg in npm/*/package.json; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$pkg', 'utf8'));
              pkg.version = '$VERSION';
              if (pkg.optionalDependencies) {
                for (const key of Object.keys(pkg.optionalDependencies)) {
                  if (key.startsWith('@fallow-cli/')) {
                    pkg.optionalDependencies[key] = '$VERSION';
                  }
                }
              }
              fs.writeFileSync('$pkg', JSON.stringify(pkg, null, 2) + '\n');
            "
          done

      - name: Install NAPI package dependencies
        run: cd crates/napi && npm ci --omit=optional

      - name: Update NAPI package version
        run: |
          VERSION="${TAG_REF#refs/tags/v}"
          node -e "
            const fs = require('fs');
            const pkgPath = 'crates/napi/package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.version = '$VERSION';
            if (pkg.optionalDependencies) {
              for (const key of Object.keys(pkg.optionalDependencies)) {
                if (key.startsWith('@fallow-cli/fallow-node')) {
                  pkg.optionalDependencies[key] = '$VERSION';
                }
              }
            }
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Prepare NAPI root package for publish
        run: cd crates/napi && npm run publish:prepare

      - name: Create NAPI platform package directories
        run: cd crates/napi && npm run create-npm-dirs

      - name: Organize NAPI addons into platform directories
        run: |
          for dir in napi-artifacts/napi-*; do
            target="crates/napi/npm/$(basename "$dir" | sed 's/^napi-//')"
            mkdir -p "$target"
            cp "$dir"/* "$target"/
          done

      - name: Publish platform packages
        run: |
          VERSION="${TAG_REF#refs/tags/v}"
          FAILED=0
          for dir in ./npm/darwin-arm64 ./npm/darwin-x64 ./npm/linux-x64-gnu ./npm/linux-arm64-gnu ./npm/linux-x64-musl ./npm/linux-arm64-musl ./npm/win32-x64-msvc ./npm/win32-arm64-msvc; do
            PKG_NAME=$(node -e "console.log(require('$dir/package.json').name)")
            echo "Publishing $PKG_NAME@$VERSION..."
            if npm view "$PKG_NAME@$VERSION" version >/dev/null 2>&1; then
              echo "  Already published, skipping"
              continue
            fi
            if ! npm publish "$dir" --access public --provenance; then
              echo "  Provenance publish failed, retrying without provenance..."
              if ! npm publish "$dir" --access public; then
                echo "::error::Failed to publish $PKG_NAME@$VERSION"
                FAILED=1
              fi
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Publish fallow
        run: |
          VERSION="${TAG_REF#refs/tags/v}"
          if npm view "fallow@$VERSION" version >/dev/null 2>&1; then
            echo "fallow@$VERSION already published, skipping"
          else
            npm publish ./npm/fallow --access public --provenance --ignore-scripts || \
              npm publish ./npm/fallow --access public --ignore-scripts
          fi

      - name: Publish NAPI platform packages
        run: |
          VERSION="${TAG_REF#refs/tags/v}"
          FAILED=0
          for dir in ./crates/napi/npm/darwin-arm64 ./crates/napi/npm/darwin-x64 ./crates/napi/npm/linux-x64-gnu ./crates/napi/npm/linux-arm64-gnu ./crates/napi/npm/linux-x64-musl ./crates/napi/npm/linux-arm64-musl ./crates/napi/npm/win32-x64-msvc ./crates/napi/npm/win32-arm64-msvc; do
            PKG_NAME=$(node -e "console.log(require('$dir/package.json').name)")
            echo "Publishing $PKG_NAME@$VERSION..."
            if npm view "$PKG_NAME@$VERSION" version >/dev/null 2>&1; then
              echo "  Already published, skipping"
              continue
            fi
            if ! npm publish "$dir" --access public --provenance; then
              echo "  Provenance publish failed, retrying without provenance..."
              if ! npm publish "$dir" --access public; then
                echo "::error::Failed to publish $PKG_NAME@$VERSION"
                FAILED=1
              fi
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Publish fallow-node
        run: |
          VERSION="${TAG_REF#refs/tags/v}"
          if npm view "@fallow-cli/fallow-node@$VERSION" version >/dev/null 2>&1; then
            echo "@fallow-cli/fallow-node@$VERSION already published, skipping"
          else
            npm publish ./crates/napi --access public --provenance --ignore-scripts || \
              npm publish ./crates/napi --access public --ignore-scripts
          fi

  vscode-publish:
    name: Publish VS Code Extension
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TAG_REF: ${{ github.ref }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: editors/vscode/pnpm-lock.yaml

      - name: Install dependencies
        run: cd editors/vscode && pnpm install --frozen-lockfile

      - name: Update extension version
        run: |
          VERSION="${TAG_REF#refs/tags/v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('editors/vscode/package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('editors/vscode/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Copy LICENSE into extension directory
        run: cp LICENSE editors/vscode/LICENSE

      - name: Build and package extension
        run: |
          cd editors/vscode
          pnpm build
          pnpm package

      - name: Publish to VS Code Marketplace
        run: cd editors/vscode && pnpm exec vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX (Cursor, VSCodium)
        run: cd editors/vscode && pnpm exec ovsx publish --no-dependencies
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fallow-vscode
          path: editors/vscode/*.vsix
