name: Miri

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'crates/graph/**'
      - 'crates/extract/**'
      - 'crates/types/**'
      - '.github/workflows/miri.yml'
  push:
    branches: [main]
    paths:
      - 'crates/graph/**'
      - 'crates/extract/**'
      - 'crates/types/**'
      - '.github/workflows/miri.yml'

permissions: {}

concurrency:
  group: miri-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Pin nightly to avoid breakage from Miri regressions (Oxc does the same)
  MIRI_TOOLCHAIN: nightly-2026-03-20

jobs:
  miri:
    name: Miri memory safety
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Miri toolchain
        run: |
          rustup toolchain install "$MIRI_TOOLCHAIN" --component miri
          cargo +"$MIRI_TOOLCHAIN" miri setup

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: miri

      # Pure data structure tests — no file I/O, all tests run
      - name: fallow-types
        run: cargo +"$MIRI_TOOLCHAIN" miri test -p fallow-types --lib --tests

      # Graph construction and resolution tests — skip proptest (file I/O for
      # persisted failures is unsupported under Miri)
      - name: fallow-graph
        run: cargo +"$MIRI_TOOLCHAIN" miri test -p fallow-graph --lib --tests -- --skip proptests

      # AST extraction — parser-heavy tests are gated with #[cfg(not(miri))]
      # in source (visitor.rs, lib.rs). Only suppress, sfc, css unit tests run.
      # Cache tests skipped (file I/O unsupported under Miri).
      - name: fallow-extract
        run: cargo +"$MIRI_TOOLCHAIN" miri test -p fallow-extract --lib --tests -- --skip cache
