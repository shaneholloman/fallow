name: Ecosystem (Full)

on:
  schedule:
    # Every Sunday at 04:00 UTC
    - cron: '0 4 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ecosystem-full-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FALLOW_QUIET: "1"

jobs:
  ecosystem-test:
    name: Test against real-world projects
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ecosystem-full

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 9

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'

      - name: Cache cloned repos
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: /tmp/fallow-ecosystem
          key: ecosystem-repos-${{ github.run_id }}
          restore-keys: |
            ecosystem-repos-

      - name: Build fallow (release)
        run: cargo build --release -p fallow-cli

      - name: Run ecosystem tests
        env:
          FALLOW_BIN: ${{ github.workspace }}/target/release/fallow
          ECOSYSTEM_DIR: /tmp/fallow-ecosystem
        run: ./tests/ecosystem/run.sh

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ecosystem-results
          path: /tmp/fallow-ecosystem/results/
          retention-days: 30
